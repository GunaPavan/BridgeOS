services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bridgeos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bridgeos
      POSTGRES_PASSWORD: bridgeos
      POSTGRES_DB: bridgeos
    ports:
      - "5432:5432"
    volumes:
      - bridgeos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgeos -d bridgeos"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: bridgeos-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  bridgeos_pgdata:
