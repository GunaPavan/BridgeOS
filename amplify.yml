# Monorepo Amplify build.
#
# This repo has both a Next.js frontend (frontend/) and a FastAPI backend
# (backend/). The Amplify app is set with AMPLIFY_MONOREPO_APP_ROOT=frontend
# at the app-env level, and that flag *requires* the YAML to use the
# monorepo `applications:` schema. Without it, Amplify rejects the build
# with `CustomerError: Monorepo spec provided without "applications" key`.
#
# When this YAML lives at the repo root with `appRoot: frontend`, Amplify
# does the `cd frontend/` for us before running the phase commands.

version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - env | grep -E "NEXT_PUBLIC|AMPLIFY" || true
            - npm run build
      artifacts:
        # Next.js SSR build output. Amplify Hosting detects
        # required-server-files.json inside .next/ and provisions
        # Lambda@Edge automatically.
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - .next/cache/**/*
